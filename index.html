			async function bacaHTMLDariSRC(url) {
			try {
				// 1. Ambil file HTML dari URL menggunakan Fetch
				const response = await fetch(url);

				// Pastikan permintaan berhasil
				if (!response.ok) {
					throw new Error(`HTTP error! status: ${response.status}`);
				}

				// 2. Ubah respon menjadi Blob
				const blob = await response.blob();

				// 3. Gunakan FileReader untuk membaca Blob sebagai teks
				const reader = new FileReader();

				reader.onload = function(event) {
					// Isi file HTML akan berupa string di dalam event.target.result
					const htmlText = event.target.result;
					//console.log("Isi HTML:", htmlText);
					myText = event.target.result;

					// Lakukan sesuatu dengan htmlText (misalnya: tampilkan ke elemen)
					//document.getElementById('output').innerText = htmlText;
					//console.log(htmlText)
				};

				reader.onerror = function(error) {
					console.error("Gagal membaca file:", error);
				};

				// Baca Blob sebagai teks
				reader.readAsText(blob);

				} catch (error) {
					console.error("Terjadi kesalahan:", error);
				}
			}
