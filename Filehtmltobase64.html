<!DOCTYPE html>
<html>
<head>
    <title>Judul Halaman Web</title>
</head>
<body>
  <input type="file" id="htmlFile" accept=".html">
  <pre id="output"></pre>
    <h1>Selamat Datang</h1>
    <p>Ini adalah paragraf pertama saya di HTML.</p>
  <script>
    document.getElementById('htmlFile').addEventListener('change', function(event) {
    const file = event.target.files[0];
    
    if (file) {
        const reader = new FileReader();
        
        // Baca file sebagai teks (bisa juga menggunakan readAsDataURL)
        reader.readAsText(file);
        
        reader.onload = function(e) {
            const htmlString = e.target.result;
            
            // Konversi string HTML ke Base64
            const base64String = btoa(htmlString);
            
            // Tampilkan hasil di konsol atau elemen HTML
            console.log(base64String);
            document.getElementById('output').textContent = base64String;
        };
    }
});

  </script>
</body>
</html>
